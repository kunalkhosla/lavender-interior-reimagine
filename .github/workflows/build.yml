name: Build and publish Docker image

# Mirrors the pattern used across Kunal's other Hostinger services
# (zeno-wa-agent, zeno-admin-portal): on push to main, build the image
# and push :latest + :sha to GHCR. On the VPS:
#   docker compose pull && docker compose up -d

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kunalkhosla/lavender-interior-reimagine:latest
            ghcr.io/kunalkhosla/lavender-interior-reimagine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
